system_id: online-boutique
system_family: ecommerce
display_name: Online Boutique
namespace: default

entry_services:
  - frontend

jaeger_services:
  - frontend
  - checkoutservice
  - cartservice
  - paymentservice
  - productcatalogservice
  - recommendationservice
  - currencyservice
  - shippingservice
  - emailservice
  - adservice
  - redis-cart

prometheus_labels:
  namespace: default
  app_label: app.kubernetes.io/name

model_profile:
  anomaly:
    registry_root: ../../../data_anomaly_balanced_v3/models
    stage: production
  rca:
    registry_root: ../../../data_rca_balanced_v3/models
    stage: production

trace_adapter: jaeger
metric_adapter: prometheus
log_adapter: kubectl

service_catalog: service_catalog.json

default_artifacts:
  anomaly_data_root: ../../../data_anomaly_balanced_v3
  rca_data_root: ../../../data_rca_balanced_v3
