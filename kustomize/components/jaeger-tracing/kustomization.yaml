# RCA-oriented tracing component for AWS/kubeadm deployments.

apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: checkoutservice
    spec:
      template:
        spec:
          containers:
          - name: server
            env:
            - name: COLLECTOR_SERVICE_ADDR
              value: "jaeger.observability.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAME
              value: "checkoutservice"
            - name: ENABLE_TRACING
              value: "1"
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: currencyservice
    spec:
      template:
        spec:
          containers:
          - name: server
            env:
            - name: COLLECTOR_SERVICE_ADDR
              value: "jaeger.observability.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAME
              value: "currencyservice"
            - name: ENABLE_TRACING
              value: "1"
            - name: DISABLE_PROFILER
              value: "1"
