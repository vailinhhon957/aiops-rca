apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- app-namespace.yaml
- ../../base
namespace: app
components:
- ../../components/nodeport-frontend
- ../../components/without-loadgenerator
patches:
- patch: |-
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: loadgenerator
    $patch: delete
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: frontend
    spec:
      template:
        spec:
          containers:
          - name: server
            env:
            - name: ENV_PLATFORM
              value: aws
