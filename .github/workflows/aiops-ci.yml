name: aiops-ci

on:
  push:
    branches: [main]
    paths:
      - "aiops_framework/**"
      - "deploy/aiops/**"
      - ".github/workflows/aiops-ci.yml"
  pull_request:
    paths:
      - "aiops_framework/**"
      - "deploy/aiops/**"
      - ".github/workflows/aiops-ci.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check AIOps services
        run: |
          python - <<'PY'
          from pathlib import Path
          targets = [
              Path("aiops_framework/dashboard/app.py"),
              Path("aiops_framework/inference/anomaly_service/app.py"),
              Path("aiops_framework/inference/rca_service/app.py"),
              Path("aiops_framework/inference/orchestrator/app.py"),
          ]
          for path in targets:
              compile(path.read_text(encoding="utf-8"), str(path), "exec")
              print(f"validated {path}")
          PY

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Validate dev overlay
        run: kustomize build deploy/aiops/environments/dev > /tmp/aiops-dev.yaml

      - name: Validate prod overlay
        run: kustomize build deploy/aiops/environments/prod > /tmp/aiops-prod.yaml

  build-and-push:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: anomaly-service
            dockerfile: deploy/aiops/docker/Dockerfile.anomaly-service
            image: aiops-anomaly-service
          - name: rca-service
            dockerfile: deploy/aiops/docker/Dockerfile.rca-service
            image: aiops-rca-service
          - name: orchestrator
            dockerfile: deploy/aiops/docker/Dockerfile.orchestrator
            image: aiops-orchestrator
          - name: dashboard
            dockerfile: deploy/aiops/docker/Dockerfile.dashboard
            image: aiops-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
