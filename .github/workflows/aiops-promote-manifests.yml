name: aiops-promote-manifests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target overlay"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      image_tag:
        description: "Image tag to write into the GitOps overlay"
        required: true

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update overlay image tags
        run: |
          python tools/update_aiops_gitops_tags.py --env "${{ inputs.environment }}" --tag "${{ inputs.image_tag }}"

      - name: Commit manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/aiops/environments/${{ inputs.environment }}/kustomization.yaml
          git commit -m "chore(aiops): promote ${{ inputs.environment }} to ${{ inputs.image_tag }}" || echo "No changes to commit"
          git push
