apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-dashboard
  labels:
    app.kubernetes.io/name: aiops-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aiops-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiops-dashboard
    spec:
      serviceAccountName: aiops-dashboard
      containers:
        - name: aiops-dashboard
          image: ghcr.io/example/aiops-dashboard:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8010
              name: http
          env:
            - name: AIOPS_DASHBOARD_ANOMALY_BASE_URL
              value: http://anomaly-service:8000
            - name: AIOPS_DASHBOARD_RCA_BASE_URL
              value: http://rca-service:8001
            - name: AIOPS_DASHBOARD_ORCH_BASE_URL
              value: http://aiops-orchestrator:8002
            - name: AIOPS_RECOVERY_MODE
              value: real
            - name: AIOPS_RECOVERY_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: AIOPS_LIVE_JAEGER_URL
              value: http://jaeger.observability.svc.cluster.local:16686
            - name: AIOPS_LIVE_SOURCE_SERVICE
              value: all
            - name: AIOPS_LIVE_SYSTEM_ID
              value: online-boutique
            - name: AIOPS_DASHBOARD_STATE_DIR
              value: /data/aiops-dashboard
          volumeMounts:
            - name: dashboard-state
              mountPath: /data/aiops-dashboard
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
      volumes:
        - name: dashboard-state
          persistentVolumeClaim:
            claimName: aiops-dashboard-state
