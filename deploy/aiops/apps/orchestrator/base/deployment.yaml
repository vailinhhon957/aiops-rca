apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-orchestrator
  labels:
    app.kubernetes.io/name: aiops-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aiops-orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiops-orchestrator
    spec:
      serviceAccountName: aiops-orchestrator
      containers:
        - name: aiops-orchestrator
          image: ghcr.io/example/aiops-orchestrator:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8002
              name: http
          env:
            - name: AIOPS_ANOMALY_BASE_URL
              value: http://anomaly-service:8000
            - name: AIOPS_RCA_BASE_URL
              value: http://rca-service:8001
            - name: AIOPS_ENABLE_AUTO_EXECUTION
              value: "true"
            - name: AIOPS_EXECUTOR_DRY_RUN
              value: "false"
            - name: AIOPS_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
